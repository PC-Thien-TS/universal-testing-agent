title: Result Schema v1.4
type: object
required:
  - run_id
  - project_name
  - project_type
  - adapter
  - status
  - started_at
  - finished_at
  - duration_seconds
  - summary
  - coverage
  - defects
  - evidence
  - recommendation
properties:
  run_id:
    type: string
  project_name:
    type: string
  project_type:
    type: string
    enum: [web, api, model]
  adapter:
    type: string
  status:
    type: string
    enum: [passed, failed, blocked, error]
  started_at:
    type: string
  finished_at:
    type: string
  duration_seconds:
    type: number
  summary:
    type: object
    required: [total_checks, passed, failed, blocked, skipped]
  coverage:
    type: object
    required: [planned_cases, executed_cases, execution_rate, requirement_coverage]
  defects:
    type: object
    required: [blocker, critical, high, medium, low]
  evidence:
    type: object
    required: [logs, screenshots, traces, artifacts]
  recommendation:
    type: object
    required: [release_ready, notes]
  policy:
    type: [object, "null"]
  run_metadata:
    type: [object, "null"]
  generated_artifacts:
    type: array
    items:
      type: string
  known_gaps:
    type: array
    items:
      type: string
  assumptions:
    type: array
    items:
      type: string
  trend_summary:
    type: [object, "null"]
  contract_validation_summary:
    type: [object, "null"]
  comparison_summary:
    type: [object, "null"]
  regression_signals:
    type: array
    items:
      type: string
  flaky_suspicion_note:
    type: [string, "null"]
  metadata:
    type: object
  raw_output:
    type: object
