title: Result Schema v1.3
type: object
required:
  - run_id
  - project_name
  - project_type
  - adapter
  - status
  - started_at
  - finished_at
  - duration_seconds
  - summary
  - coverage
  - defects
  - evidence
  - recommendation
properties:
  run_id:
    type: string
  project_name:
    type: string
  project_type:
    type: string
    enum: [web, api, model]
  adapter:
    type: string
  status:
    type: string
    enum: [passed, failed, blocked, error]
  started_at:
    type: string
  finished_at:
    type: string
  duration_seconds:
    type: number
  summary:
    type: object
    required: [total_checks, passed, failed, blocked, skipped]
    properties:
      total_checks:
        type: integer
      passed:
        type: integer
      failed:
        type: integer
      blocked:
        type: integer
      skipped:
        type: integer
  coverage:
    type: object
    required: [planned_cases, executed_cases, execution_rate, requirement_coverage]
    properties:
      planned_cases:
        type: integer
      executed_cases:
        type: integer
      execution_rate:
        type: number
      requirement_coverage:
        type: number
  defects:
    type: object
    required: [blocker, critical, high, medium, low]
    properties:
      blocker:
        type: integer
      critical:
        type: integer
      high:
        type: integer
      medium:
        type: integer
      low:
        type: integer
  evidence:
    type: object
    required: [logs, screenshots, traces, artifacts]
    properties:
      logs:
        type: array
        items:
          type: string
      screenshots:
        type: array
        items:
          type: string
      traces:
        type: array
        items:
          type: string
      artifacts:
        type: array
        items:
          type: string
  recommendation:
    type: object
    required: [release_ready, notes]
    properties:
      release_ready:
        type: boolean
      notes:
        type: array
        items:
          type: string
  policy:
    type: [object, "null"]
    properties:
      release_ready:
        type: boolean
      verdict:
        type: string
      reasons:
        type: array
        items:
          type: string
      evaluated_rules:
        type: object
  run_metadata:
    type: [object, "null"]
    properties:
      run_id:
        type: string
      command:
        type: string
      project_name:
        type: string
      project_type:
        type: string
      manifest_path:
        type: string
      started_at:
        type: string
      finished_at:
        type: string
      duration_seconds:
        type: number
      status:
        type: string
      artifact_dir:
        type: string
  generated_artifacts:
    type: array
    items:
      type: string
  known_gaps:
    type: array
    items:
      type: string
  assumptions:
    type: array
    items:
      type: string
  metadata:
    type: object
  raw_output:
    type: object
