name: api-verify-store-staging
project_type: api
artifacts:
  - name: verify-store-openapi
    type: openapi-spec
    path: manifests/samples/verify_store_openapi.yaml
environment:
  type: staging
  base_url: ""
  auth:
    type: bearer
    token_env: STORE_API_TOKEN
  headers:
    X-Client: uta-ci
    X-Stage: staging
  timeouts:
    api_s: 2
  notes: "Offline-safe smoke mode should simulate requests when base_url is empty."
request:
  goal: Validate verify-store API behavior with staging-style environment settings
  endpoints:
    - path: /store/health
      expected_status: 200
    - path: /store/items
      expected_status: 200
  required_fields:
    /store/items:
      - id
      - event_type
  negative_cases:
    - endpoint: /store/items
      method: GET
      query:
        limit: -1
      expected_status: 400
acceptance:
  max_failed: 0
  minimum_coverage: 0.6
outputs:
  report_format: json
  include_markdown: true
